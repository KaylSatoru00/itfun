        display: flex;

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],

        frameworkUrl: "Build/Keyboarding.framework.js.br",
        codeUrl: "Build/Keyboarding.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "3",
        productVersion: "1.0",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
